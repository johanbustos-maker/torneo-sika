<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Líderes Torneo Sika</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        h1 { 
            color: #ffcc00; 
            font-size: 3rem; 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 30px;
        }
        .tabla-container { 
            max-width: 900px; 
            margin: auto; 
            background: #2d2d2d; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 1.8rem;
        }
        th, td { 
            padding: 14px; 
            text-align: left; 
            border-bottom: 1px solid #444; 
        }
        th { 
            color: #ffcc00; 
            text-transform: uppercase;
            font-size: 1.4rem;
        }
        tr:nth-child(even) { background-color: #333; }
        tr:hover { background-color: #3d3d3d; }
        .posicion { width: 10%; font-weight: bold; color: #ffcc00; text-align: center; }
        .nombre { width: 65%; text-transform: uppercase; }
        .puntos { width: 25%; text-align: right; font-weight: bold; color: #00ff66; }
        .top3 { color: #ffcc00; font-size: 2.2rem; }
    </style>
</head>
<body>

    <h1>🏆 TABLA DE POSICIONES - TORNEO SIKA 🏆</h1>
    <div class="subtitle">Actualización en vivo • Top 20</div>

    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th style="text-align: center;">Pos</th>
                    <th>Maestro Experto</th>
                    <th style="text-align: right;">Total Puntos</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                </tbody>
        </table>
    </div>

    <script>
        async function actualizarLeaderboard() {
            try {
                const res = await fetch('/api/maestros');
                const maestros = await res.json();
                
                // Filtramos estrictamente los primeros 20 participantes
                const top20 = maestros.slice(0, 20);
                
                const cuerpo = document.getElementById('tabla-cuerpo');
                cuerpo.innerHTML = '';

                top20.forEach((m, index) => {
                    const esTop3 = index < 3 ? 'top3' : '';
                    cuerpo.innerHTML += `
                        <tr class="${esTop3}">
                            <td class="posicion">${index + 1}</td>
                            <td class="nombre">${m.nombre}</td>
                            <td class="puntos">${m.total.toLocaleString()} pts</td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error("Error actualizando pantalla gigante", e);
            }
        }

        // Ejecutar inmediatamente y programar actualización cada 1 segundo (1000ms)
        actualizarLeaderboard();
        setInterval(actualizarLeaderboard, 1000);
    </script>
</body>
</html>
