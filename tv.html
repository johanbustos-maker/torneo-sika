<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sika - Tabla de Posiciones</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #fff; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffcc00; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 5px; }
        .sub { color: #aaa; font-size: 1.2rem; margin-bottom: 30px; }
        .tabla-leaderboard { width: 90%; max-width: 800px; margin: auto; border-collapse: collapse; background: #1e1e1e; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        th { background-color: #2a2a2a; color: #ffcc00; padding: 15px; text-transform: uppercase; font-size: 1.1rem; }
        td { padding: 18px; border-bottom: 1px solid #333; font-size: 1.3rem; font-weight: bold; color: #ffcc00; font-family: 'Segoe UI', Arial, sans-serif; text-transform: uppercase; }
        .pos { color: #ffcc00; font-size: 1.5rem; }
        .pts { color: #00ff66; text-align: right; padding-right: 30px; }
        tr:nth-child(even) { background-color: #252525; }
    </style>
</head>
<body>
    <h1>🏆 TABLA DE POSICIONES - TORNEO SIKA</h1>
    <div class="sub">Actualización en vivo • Top 20</div>

    <table class="tabla-leaderboard">
        <thead>
            <tr>
                <th style="width: 15%;">POS</th>
                <th style="text-align: left; padding-left: 20px;">MAESTRO EXPERTO</th>
                <th style="text-align: right; padding-right: 30px; width: 25%;">TOTAL PUNTOS</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo"></tbody>
    </table>

    <script>
        async function actualizarLeaderboard() {
            try {
                const res = await fetch('/api/maestros');
                let maestros = await res.json();

                // COPIA DE SEGURIDAD INTERNA:
                // Si el servidor se reinició a 0 pero tenemos datos guardados en este navegador, se los enviamos para restaurar
                let localData = localStorage.getItem('respaldo_torneo');
                if (localData) {
                    let backup = JSON.parse(localData);
                    // Si el servidor viene en blanco pero el navegador tiene historial, usamos el del navegador
                    let servidorVacio = maestros.every(m => m.total === 0) && maestros.length <= 3;
                    if (servidorVacio && backup.length > maestros.length) {
                        maestros = backup;
                        // Sincronizar el servidor con nuestro respaldo
                        await fetch('/api/sumar-puntos', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ restaurarTodo: maestros })
                        });
                    }
                }

                // Guardar siempre el estado más alto actual en el navegador
                localStorage.setItem('respaldo_torneo', JSON.stringify(maestros));

                const cuerpo = document.getElementById('tabla-cuerpo');
                cuerpo.innerHTML = '';

                // Mostrar Top 20 ordenado
                const top20 = [...maestros].sort((a,b) => b.total - a.total).slice(0, 20);

                top20.forEach((m, index) => {
                    cuerpo.innerHTML += `
                        <tr>
                            <td class="pos">${index + 1}</td>
                            <td style="text-align: left; padding-left: 20px;">${m.nombre}</td>
                            <td class="pts">${m.total} pts</td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error("Error cargando tabla:", e);
            }
        }

        setInterval(actualizarLeaderboard, 2000);
        actualizarLeaderboard();
    </script>
</body>
</html>
