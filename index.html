<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Puntos - Torneo Sika</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; }
        .container { max-width: 500px; background: white; padding: 20px; margin: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; font-size: 16px; }
        select { border: 1px solid #ccc; }
        .grid-puntos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .btn-puntos { background-color: #ffcc00; color: #000; font-weight: bold; border: none; cursor: pointer; }
        .btn-puntos:active { background-color: #e6b800; }
        .mensaje { margin-top: 15px; font-weight: bold; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Torneo Sika - Control de Estación</h2>
        <label for="maestro-select">Seleccione el Maestro:</label>
        <select id="maestro-select">
            <option value="">Cargando lista...</option>
        </select>

        <h3>Asignar Puntos:</h3>
        <div class="grid-puntos">
            <button class="btn-puntos" onclick="sumar(50)">+50</button>
            <button class="btn-puntos" onclick="sumar(100)">+100</button>
            <button class="btn-puntos" onclick="sumar(150)">+150</button>
            <button class="btn-puntos" onclick="sumar(200)">+200</button>
            <button class="btn-puntos" onclick="sumar(250)">+250</button>
            <button class="btn-puntos" onclick="sumar(250)">+300</button>
        </div>
        <div id="status" class="mensaje"></div>
    </div>

    <script>
        async function cargarMaestros() {
            const res = await fetch('/api/maestros');
            const maestros = await res.json();
            const select = document.getElementById('maestro-select');
            select.innerHTML = '<option value="">-- Seleccione --</option>';
            maestros.forEach(m => {
                select.innerHTML += `<option value="${m.id}">${m.nombre}</option>`;
            });
        }

        async function sumar(puntos) {
            const id = document.getElementById('maestro-select').value;
            const statusDiv = document.getElementById('status');
            if (!id) { alert('Por favor, selecciona un maestro primero.'); return; }
            
            statusDiv.innerText = "Cargando...";
            const res = await fetch('/api/sumar-puntos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, puntos })
            });
            
            if (res.ok) {
                statusDiv.innerText = `¡Se sumaron +${puntos} puntos exitosamente!`;
                setTimeout(() => statusDiv.innerText = "", 3000);
            } else {
                statusDiv.innerText = "Error al cargar los puntos.";
            }
        }
        cargarMaestros();
    </script>
</body>
</html>
